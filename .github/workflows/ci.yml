name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-test:
    name: fmt / clippy / test / cross-compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW (for x86_64-pc-windows-gnu cross-compilation)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends mingw-w64

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test (Linux, native)
        run: cargo test --workspace

      - name: Build (cross-compile to Windows, MinGW)
        run: cargo build --workspace --target x86_64-pc-windows-gnu

      - name: Build launcher binary (Linux, native)
        run: cargo build --workspace

      - name: Setup Node for e2e tests
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: e2e/package-lock.json

      - name: Install e2e dependencies and Playwright browsers
        run: |
          cd e2e
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Playwright e2e tests
        run: |
          cd e2e
          npx playwright test
